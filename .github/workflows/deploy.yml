name: Deploy API

# Triggered manually for now. Once CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
# repo secrets are configured and the team is ready for auto-deploys on merge,
# add a `push: branches: [main]` trigger alongside workflow_dispatch.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @skipper/api typecheck

      - run: pnpm --filter @skipper/api test

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: deploy
