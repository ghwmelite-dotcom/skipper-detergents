<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-labelledby="scc-mark-title" role="img">
  <title id="scc-mark-title">Skipper CleanCare</title>

  <!-- Seal outer ring -->
  <circle cx="100" cy="100" r="94" fill="#FCFBF7"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#0B2545" stroke-width="6"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#0B2545" stroke-width="1"/>

  <!-- Inner dotted ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#0B2545" stroke-width="2" stroke-dasharray="0.5 4" stroke-linecap="round"/>

  <!-- Captain's peaked cap -->
  <g>
    <path d="M 78 66 Q 100 59 122 66 L 124 86 L 76 86 Z" fill="#0B2545"/>
    <path d="M 75 86 L 125 86 L 126 94 L 74 94 Z" fill="#00B4D8"/>
    <!-- tiny anchor -->
    <g fill="none" stroke="#0B2545" stroke-width="0.8" stroke-linecap="round" transform="translate(100 90)">
      <circle cx="0" cy="-3" r="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4"/>
      <path d="M -3 3 Q 0 6 3 3"/>
      <line x1="-2.2" y1="0" x2="2.2" y2="0"/>
    </g>
    <path d="M 69 94 L 131 94 Q 100 107 69 94 Z" fill="#0B2545"/>
  </g>

  <!-- Water drop -->
  <g transform="translate(100 117)">
    <path d="M 0 -7 C 5 -2 6 3 4 6 C 2 9 -2 9 -4 6 C -6 3 -5 -2 0 -7 Z" fill="#00B4D8"/>
  </g>

  <!-- Wave -->
  <g fill="none" stroke-linecap="round">
    <path d="M 68 138 Q 82 130 96 138 T 124 138 T 140 138" stroke="#00B4D8" stroke-width="2.5"/>
    <path d="M 64 148 Q 80 140 96 148 T 124 148 T 144 148" stroke="#0B2545" stroke-width="3"/>
  </g>
</svg>
